# ThoughtFlow 工作区本地配置模板。
# 实际生效路径：<workspace>/.thoughtflow/config.local.yaml
#
# 配置加载顺序：
# 1. 内置默认值
# 2. 工作区本地配置文件
# 3. 环境变量
# 4. CLI 参数映射成的环境变量

server:
  # HTTP 监听地址。
  host: "127.0.0.1"
  port: "8080"

workspace:
  # 工作区根目录。相对路径按进程工作目录解析。
  root: "./thoughtflow-workspace"
  # Git 初始化策略配置字段。当前提交行为由 git_sync.enabled
  # 以及工作区实际 Git 仓库状态共同决定。
  auto_init_git: true

capture:
  # 当前支持 "warn" 和 "allow"。
  # "warn" 会保留重复采集内容，并标记 duplicate_warned。
  duplicate_policy: "warn"

refiner:
  # 加工运行时并发配置字段。
  concurrency: 2
  # URL 抓取超时时间，单位秒。
  url_fetch_timeout_seconds: 30

git_sync:
  # 是否为 Markdown/YAML 工作区变更启用本地 Git 自动提交请求。
  enabled: true
  # 待提交变更写入 Git 前的 debounce 窗口，单位秒。
  debounce_seconds: 5

search:
  # 相对路径按 workspace.root 解析。
  duckdb_path: ".thoughtflow/thoughtflow.duckdb"
  # 支持 keyword、semantic、hybrid。
  default_mode: "hybrid"

topic:
  # 专题命中后是否启用自动专题文档缝合。
  auto_weave: true
  # 专题语义匹配策略使用的默认分数阈值。
  min_semantic_score: 0.78

events:
  # SSE 心跳间隔，单位秒。
  sse_heartbeat_seconds: 20

ai:
  # OpenAI-compatible provider。api_key 为空时使用本地规则 fallback。
  base_url: "https://api.openai.com"
  api_key: ""
  chat_model: "gpt-4o-mini"
  embedding_model: "text-embedding-3-small"
  timeout_seconds: 30
