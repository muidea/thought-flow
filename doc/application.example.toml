# ThoughtFlow magicCommon application configuration template.
# Effective path: <config-dir>/application.toml
# Default config dir: OS user config directory, for example ~/.config/thoughtflow on Linux.
#
# ThoughtFlow reuses magicCommon framework/configuration directly:
# 1. Built-in ThoughtFlow defaults.
# 2. magicCommon application config: <config-dir>/application.toml
# Runtime configuration is not read from environment variables.

[server]
# HTTP listen address.
host = "127.0.0.1"
port = 8080

[workspace]
# Content directory stores user-owned knowledge assets: thoughts, topics, and attachments.
# These files are readable outside ThoughtFlow and are the content Git should track.
# Relative paths are resolved from the process working directory.
content_dir = "./thoughtflow-workspace"
# Git initialization policy field. Commit behavior is controlled by git_sync.enabled
# and the actual local Git repository state.
auto_init_git = true

[runtime]
# State directory stores rebuildable service state: jobs, logs, and local indexes.
# Keep it separate from the config directory and outside the knowledge asset model.
state_dir = "./thoughtflow-runtime"

[capture]
# Supported values: "warn" and "allow".
# "warn" preserves duplicate captures and marks duplicate_warned.
duplicate_policy = "warn"

[refiner]
# Refine runtime concurrency.
concurrency = 2
# URL fetch timeout in seconds.
url_fetch_timeout_seconds = 30

[git_sync]
# Whether to enable local Git auto-commit requests for Markdown/YAML workspace changes.
enabled = true
# Debounce window before pending changes are written to Git, in seconds.
debounce_seconds = 5

[search]
# Relative paths are resolved against runtime.state_dir.
duckdb_path = "thoughtflow.duckdb"
# Supported values: keyword, semantic, hybrid.
default_mode = "hybrid"

[topic]
# Whether to enable automatic topic document weaving after topic matches.
auto_weave = true
# Default semantic matching threshold for topics.
min_semantic_score = 0.78

[events]
# SSE heartbeat interval in seconds.
sse_heartbeat_seconds = 20

[llm]
# OpenAI-compatible chat provider. Empty api_key uses the local-rule fallback.
base_url = "https://api.openai.com"
api_key = ""
chat_model = "gpt-4o-mini"
timeout_seconds = 30

[embedding]
# OpenAI-compatible embedding provider. Empty api_key uses deterministic local embeddings.
base_url = "https://api.openai.com"
api_key = ""
model = "text-embedding-3-small"
timeout_seconds = 30
