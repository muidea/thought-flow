<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ThoughtFlow</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">TF</div>
          <div>
            <h1>ThoughtFlow</h1>
            <p id="system-status">Connecting</p>
          </div>
        </div>

        <section class="side-section">
          <div class="section-title">
            <h2>Topics</h2>
            <button class="icon-button" id="refresh-topics" title="Refresh topics" aria-label="Refresh topics">R</button>
          </div>
          <div id="topic-list" class="topic-list"></div>
        </section>
      </aside>

      <main class="workspace">
        <section class="capture-strip">
          <form id="capture-form" class="capture-form">
            <div class="segmented" role="group" aria-label="Capture type">
              <label><input type="radio" name="type" value="text" checked> Text</label>
              <label><input type="radio" name="type" value="url"> URL</label>
            </div>
            <input id="capture-title" type="text" placeholder="Title">
            <input id="capture-tags" type="text" placeholder="tags, comma separated">
            <textarea id="capture-content" placeholder="Capture a thought or paste a URL"></textarea>
            <button type="submit">Capture</button>
          </form>
        </section>

        <section class="main-grid">
          <section class="panel search-panel">
            <div class="panel-header">
              <h2>Search Hub</h2>
              <div class="toolbar">
                <select id="search-mode" aria-label="Search mode">
                  <option value="hybrid">Hybrid</option>
                  <option value="keyword">Keyword</option>
                  <option value="semantic">Semantic</option>
                </select>
                <button id="reindex-button">Reindex</button>
              </div>
            </div>
            <form id="search-form" class="search-form">
              <input id="search-query" type="search" placeholder="Search thoughts">
              <input id="search-tags" type="text" placeholder="filter tags">
              <button type="submit">Search</button>
            </form>
            <div id="search-results" class="results-list"></div>
          </section>

          <section class="panel detail-panel">
            <div class="tabs" role="tablist">
              <button class="tab active" data-tab="topic">Topic</button>
              <button class="tab" data-tab="review">Review</button>
              <button class="tab" data-tab="synthesis">Synthesis</button>
              <button class="tab" data-tab="activity">Activity</button>
            </div>

            <div id="tab-topic" class="tab-panel active">
              <div class="panel-header">
                <h2 id="topic-title">Topic Workspace</h2>
                <button id="rebuild-topic" disabled>Rebuild</button>
              </div>
              <div id="topic-document" class="markdown-preview markdown-rendered">Select a topic from the left.</div>
            </div>

            <div id="tab-review" class="tab-panel">
              <div class="panel-header">
                <h2 id="weave-review-title">Weave Review</h2>
                <button id="accept-weave" disabled>Accept</button>
              </div>
              <div id="weave-proposals" class="approval-list">No weave proposals.</div>
              <div id="weave-diff" class="diff-view">Select a search result to review topic weaving.</div>
              <textarea id="weave-document" class="markdown-preview" spellcheck="false" placeholder="Proposed topic document"></textarea>
            </div>

            <div id="tab-synthesis" class="tab-panel">
              <form id="synthesis-form" class="stack-form">
                <input id="synthesis-goal" type="text" placeholder="Goal">
                <select id="synthesis-format">
                  <option value="summary">Summary</option>
                  <option value="outline">Outline</option>
                  <option value="report">Report</option>
                </select>
                <button type="submit">Create draft</button>
                <button type="button" id="save-synthesis" disabled>Save as thought</button>
              </form>
              <textarea id="synthesis-output" class="markdown-preview" spellcheck="false">Select search results, then create a draft.</textarea>
            </div>

            <div id="tab-activity" class="tab-panel">
              <div id="event-list" class="event-list"></div>
            </div>
          </section>
        </section>
      </main>

      <aside class="right-rail">
        <section class="panel">
          <div class="panel-header">
            <h2>Create Topic</h2>
          </div>
          <form id="topic-form" class="stack-form">
            <input id="topic-name" type="text" placeholder="Name">
            <textarea id="topic-description" placeholder="Description"></textarea>
            <input id="topic-keywords" type="text" placeholder="keywords">
            <input id="topic-tags" type="text" placeholder="tags">
            <label class="toggle-row"><input id="topic-semantic" type="checkbox"> Semantic</label>
            <input id="topic-threshold" type="number" min="0" max="1" step="0.05" value="0.75" aria-label="Semantic threshold">
            <button type="submit">Create</button>
          </form>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Topic Rules</h2>
          </div>
          <form id="topic-edit-form" class="stack-form">
            <input id="edit-topic-name" type="text" placeholder="Name" disabled>
            <textarea id="edit-topic-description" placeholder="Description" disabled></textarea>
            <input id="edit-keywords-any" type="text" placeholder="keywords any" disabled>
            <input id="edit-keywords-all" type="text" placeholder="keywords all" disabled>
            <input id="edit-keywords-exclude" type="text" placeholder="keywords exclude" disabled>
            <input id="edit-tags-any" type="text" placeholder="tags any" disabled>
            <input id="edit-manual-include" type="text" placeholder="manual include thought ids" disabled>
            <input id="edit-manual-exclude" type="text" placeholder="manual exclude thought ids" disabled>
            <label class="toggle-row"><input id="edit-semantic" type="checkbox" disabled> Semantic</label>
            <input id="edit-threshold" type="number" min="0" max="1" step="0.05" value="0.75" aria-label="Semantic threshold" disabled>
            <label class="toggle-row"><input id="edit-auto-weave" type="checkbox" disabled> Auto weave</label>
            <textarea id="edit-outline" placeholder="outline, one heading per line" disabled></textarea>
            <button id="save-topic-rules" type="submit" disabled>Save rules</button>
          </form>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Preview</h2>
          </div>
          <div id="thought-preview" class="preview-box markdown-rendered">No thought selected.</div>
        </section>
      </aside>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
